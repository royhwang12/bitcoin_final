<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blockchain Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: #1f2937;
      --panel-soft: #273244;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #374151;
      --accent: #60a5fa;
      --danger: #f87171;
      --ok: #34d399;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      background: #0f172a;
    }

    h1,
    h2,
    h3 {
      margin: 0;
    }

    h1 {
      font-size: 28px;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 12px;
    }

    h3 {
      font-size: 15px;
      margin-bottom: 8px;
    }

    main {
      display: grid;
      gap: 16px;
      grid-template-columns: 360px 1fr;
      padding: 16px;
    }

    button,
    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: #111827;
      color: var(--text);
      font: inherit;
    }

    button {
      background: var(--accent);
      border: 0;
      color: #07111f;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    form,
    .controls {
      display: grid;
      gap: 10px;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      min-width: 0;
    }

    .card {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
    }

    .muted {
      color: var(--muted);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 6px 0;
    }

    .pill {
      border-radius: 999px;
      padding: 3px 8px;
      background: #111827;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .ok {
      color: var(--ok);
    }

    .error {
      color: var(--danger);
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break: break-all;
    }

    .log {
      min-height: 36px;
      max-height: 120px;
      overflow: auto;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Blockchain Dashboard</h1>
    <p class="muted">Local tracker, peers, ledger, mempool, and chain state.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Controls</h2>
      <div class="controls">
        <button id="start-tracker">Start Tracker</button>

        <form id="wallet-form">
          <h3>Create Wallet</h3>
          <label>
            Name
            <input id="wallet-name" placeholder="Alice">
          </label>
          <label>
            Initial Balance
            <input id="wallet-balance" type="number" min="0" value="0">
          </label>
          <button type="submit">Create Wallet</button>
        </form>

        <form id="peer-form">
          <h3>Create Peer</h3>
          <label>
            Miner Wallet
            <select id="miner-wallet"></select>
          </label>
          <label>
            <span>
              <input id="start-mining" type="checkbox" style="width:auto">
              Enable mining
            </span>
          </label>
          <button type="submit">Create Peer</button>
        </form>

        <form id="tx-form">
          <h3>Send Transaction</h3>
          <label>
            Submit Through Peer
            <select id="tx-peer"></select>
          </label>
          <label>
            Sender
            <select id="tx-sender"></select>
          </label>
          <label>
            Recipient
            <select id="tx-recipient"></select>
          </label>
          <label>
            Amount
            <input id="tx-amount" type="number" min="1" value="1">
          </label>
          <button type="submit">Submit Transaction</button>
        </form>

        <div class="panel log" id="status-log"></div>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Network</h2>
        <div id="network"></div>
      </div>

      <div class="panel">
        <h2>Ledger</h2>
        <div id="ledger"></div>
      </div>

      <div class="panel">
        <h2>Chain</h2>
        <div id="chain"></div>
      </div>

      <div class="panel">
        <h2>Mempool</h2>
        <div id="mempool"></div>
      </div>
    </section>
  </main>

  <script>
    let state = { tracker: {}, wallets: [], peers: [] };

    const $ = (id) => document.getElementById(id);
    const short = (value) => value ? `${value.slice(0, 10)}...${value.slice(-6)}` : "";
    const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[char]));

    function log(message, isError = false) {
      const line = document.createElement("div");
      line.className = isError ? "error" : "ok";
      line.textContent = `${new Date().toLocaleTimeString()} ${message}`;
      $("status-log").prepend(line);
    }

    async function postJson(url, body = {}) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || `Request failed: ${response.status}`);
      }
      return data;
    }

    function walletLabel(wallet) {
      return `${wallet.name} (${short(wallet.address)})`;
    }

    function fillSelect(select, items, label, includeEmpty = false) {
      // Don't disturb a select the user is currently interacting with;
      // rebuilding mid-click would destroy the option being clicked and
      // snap the value back to the first entry.
      if (document.activeElement === select) return;

      const desired = (includeEmpty ? [["", "None"]] : [])
        .concat(items.map((item) => [String(item.id), label(item)]));
      const current = [...select.options].map((option) => [option.value, option.text]);

      const unchanged =
        desired.length === current.length &&
        desired.every(([value, text], i) => current[i][0] === value && current[i][1] === text);
      if (unchanged) return;

      const previous = select.value;
      select.innerHTML = "";
      for (const [value, text] of desired) {
        select.append(new Option(text, value));
      }
      if ([...select.options].some((option) => option.value === previous)) {
        select.value = previous;
      }
    }

    function syncControls() {
      fillSelect($("miner-wallet"), state.wallets, walletLabel, true);
      fillSelect($("tx-sender"), state.wallets, walletLabel);
      fillSelect($("tx-recipient"), state.wallets, walletLabel);
      fillSelect($("tx-peer"), state.peers, (peer) => `${peer.id}: ${peer.addr}`);
    }

    function renderNetwork() {
      const tracker = state.tracker || {};
      const body = $("network");
      body.innerHTML = `
        <div class="row"><span>Tracker</span><span class="pill">${tracker.running ? "running" : "stopped"}</span></div>
        <div class="row"><span>Address</span><span class="mono">${tracker.host || ""}:${tracker.port || ""}</span></div>
        <div class="row"><span>Registered Peers</span><span>${(tracker.peers || []).length}</span></div>
      `;
      for (const peer of state.peers) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="row"><strong>Peer ${peer.id}</strong><span class="pill">${peer.running ? "running" : "stopped"}</span></div>
          <div class="mono">${peer.addr}</div>
          <div class="row"><span>Height</span><span>${peer.height}</span></div>
          <div class="row"><span>Mempool</span><span>${peer.mempool_size}</span></div>
          <div class="row"><span>Mining</span><span>${peer.is_mining ? "yes" : "no"}</span></div>
          <div class="row"><span>Known Peers</span><span>${peer.known_peers.length}</span></div>
          <div class="mono muted">tip ${short(peer.tip_hash)}</div>
        `;
        body.append(card);
      }
    }

    function renderLedger() {
      const body = $("ledger");
      body.innerHTML = "";
      for (const peer of state.peers) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h3>Peer ${peer.id}</h3>`;
        for (const balance of peer.balances) {
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML = `
            <span>${escapeHtml(balance.name)}<br><span class="mono muted">${short(balance.address)}</span></span>
            <span>${balance.balance}</span>
          `;
          card.append(row);
        }
        body.append(card);
      }
      if (!state.peers.length) {
        body.innerHTML = `<p class="muted">Create a peer to see balances.</p>`;
      }
    }

    function renderChain() {
      const body = $("chain");
      const peer = state.peers[0];
      if (!peer) {
        body.innerHTML = `<p class="muted">Create a peer to see blocks.</p>`;
        return;
      }
      body.innerHTML = "";
      for (const block of [...peer.blocks].reverse()) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="row"><strong>Block ${block.index}</strong><span>${block.tx_count} tx</span></div>
          <div class="row"><span>Nonce</span><span>${block.nonce}</span></div>
          <div class="mono">hash ${short(block.hash)}</div>
          <div class="mono muted">prev ${short(block.prev_hash)}</div>
        `;
        body.append(card);
      }
    }

    function renderMempool() {
      const body = $("mempool");
      body.innerHTML = "";
      for (const peer of state.peers) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h3>Peer ${peer.id}</h3>`;
        if (!peer.mempool.length) {
          card.innerHTML += `<p class="muted">No pending transactions.</p>`;
        }
        for (const tx of peer.mempool) {
          card.innerHTML += `
            <div class="mono">${short(tx.hash)}</div>
            <div class="row"><span>Amount</span><span>${tx.amount}</span></div>
            <div class="row"><span>Nonce</span><span>${tx.nonce}</span></div>
          `;
        }
        body.append(card);
      }
      if (!state.peers.length) {
        body.innerHTML = `<p class="muted">Create a peer to see pending transactions.</p>`;
      }
    }

    function render(nextState) {
      state = nextState;
      syncControls();
      renderNetwork();
      renderLedger();
      renderChain();
      renderMempool();
    }

    async function refresh() {
      const response = await fetch("/api/state");
      render(await response.json());
    }

    function connectStateSocket() {
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(`${protocol}://${location.host}/ws/state`);
      socket.onmessage = (event) => render(JSON.parse(event.data));
      socket.onopen = () => log("connected to /ws/state");
      socket.onclose = () => {
        log("state socket closed; retrying", true);
        setTimeout(connectStateSocket, 1000);
      };
    }

    $("start-tracker").addEventListener("click", async () => {
      try {
        await postJson("/api/start");
        log("tracker started");
        await refresh();
      } catch (error) {
        log(error.message, true);
      }
    });

    $("wallet-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await postJson("/api/wallets", {
          name: $("wallet-name").value || null,
          initial_balance: Number($("wallet-balance").value || 0),
        });
        log("wallet created");
        event.target.reset();
        $("wallet-balance").value = 0;
        await refresh();
      } catch (error) {
        log(error.message, true);
      }
    });

    $("peer-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const startMining = $("start-mining").checked;
        await postJson("/api/peers", {
          start_mining: startMining,
          miner_wallet_id: startMining ? Number($("miner-wallet").value) : null,
        });
        log("peer created");
        await refresh();
      } catch (error) {
        log(error.message, true);
      }
    });

    $("tx-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await postJson("/api/transactions", {
          peer_id: Number($("tx-peer").value),
          sender_wallet_id: Number($("tx-sender").value),
          recipient_wallet_id: Number($("tx-recipient").value),
          amount: Number($("tx-amount").value),
        });
        log("transaction submitted");
        await refresh();
      } catch (error) {
        log(error.message, true);
      }
    });

    refresh();
    connectStateSocket();
  </script>
</body>
</html>
